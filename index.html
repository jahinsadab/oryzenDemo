<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oryzen</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <h1 class="text-center">Oryzen</h1>

    <section class="mobile-bottom-navigation d-block d-md-none">
      <nav class="navbar fixed-bottom navbar-light bg-light">
        <div class="container-fluid d-flex justify-content-between">
          <a
            href="home.html"
            class="nav-item d-flex flex-column align-items-center"
          >
            <i class="bi bi-house-door"></i>
            <span>Home</span>
          </a>

          <!-- class="nav-item d-flex flex-column align-items-center" -->

          <div class="btn-group dropup">
            <button
              type="button"
              class="btn dropdown-toggle nav-item d-flex flex-column align-items-center"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <i class="bi bi-grid"></i>
              <span>Category</span>
            </button>
            <ul class="dropdown-menu">
              <div class="category-menu">
                <div class="card p-2" style="width: 300px">
                  <!-- Horizontal Handlebar -->
                  <div
                    class="bg-secondary bg-opacity-50 rounded-pill mx-auto mb-3"
                    style="width: 40px; height: 5px; cursor: row-resize"
                  ></div>

                  <div class="d-flex justify-content-between">
                    <h3>Shop by Category</h3>
                    <button
                      type="button"
                      class="btn-close bg-secondary rounded-pill"
                      aria-label="Close"
                    ></button>
                  </div>

                  <div class="bg-light p-3">
                    <div class="row gap-2">
                      <div class="col-3 d-flex flex-column align-items-center bg-white border rounded">
                        <i class="bi bi-grid"></i>
                        <span>New Arrivals</span>
                      </div>
                      <div class="col-3 d-flex flex-column align-items-center bg-white border rounded">
                        <i class="bi bi-grid"></i>
                        <span>Top Selling</span>
                      </div>
                      <div class="col-3 d-flex flex-column align-items-center bg-white border rounded">
                        <i class="bi bi-grid"></i>
                        <span>Free Delivery</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </ul>
          </div>

          <a
            href="home.html"
            class="nav-item d-flex flex-column align-items-center"
          >
            <i class="bi bi-cart3"></i>
            <span>Cart</span>
          </a>
          <button class="nav-item d-flex flex-column align-items-center">
            <i class="bi bi-chat"></i>
            <span>Chat</span>
          </button>
          <a
            href="home.html"
            class="nav-item d-flex flex-column align-items-center"
          >
            <i class="bi bi-person"></i>
            <span>Login</span>
          </a>
        </div>
      </nav>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
      integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
      integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
