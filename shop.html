<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Fabrilife Clone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/cards.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>

  <body>
    <!-- Desktop Header -->

    <header class="desktop-header d-none d-lg-block">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="#"> FABRILIFE </a>

          <form class="search-box mx-auto">
            <input class="form-control" placeholder="Search products" />
          </form>

          <div class="header-icons">
            <a href="#"><i class="bi bi-heart"></i></a>

            <a href="#"><i class="bi bi-cart3"></i></a>

            <a href="#"><i class="bi bi-person"></i></a>
          </div>
        </div>
      </nav>
    </header>

    <!-- Mobile Header -->

    <header class="mobile-header d-lg-none">
      <div class="container-fluid">
        <div class="mobile-top">
          <button class="icon-btn">
            <i class="bi bi-list"></i>
          </button>

          <div class="logo">FABRILIFE</div>

          <div>
            <button class="icon-btn">
              <i class="bi bi-search"></i>
            </button>

            <button class="icon-btn">
              <i class="bi bi-heart"></i>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->

        <div class="col-lg-3 sidebar d-none d-lg-block">Sidebar Here</div>

        <!-- Products -->

        <div class="col-lg-9 col-12">
          <div class="content">Search & Products Here</div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->

    <nav class="mobile-bottom d-lg-none">
      <a class="active">
        <i class="bi bi-house-door"></i>

        <span>Home</span>
      </a>

      <a>
        <i class="bi bi-grid"></i>

        <span>Category</span>
      </a>

      <a>
        <i class="bi bi-cart3"></i>

        <span>Cart</span>
      </a>

      <a>
        <i class="bi bi-chat"></i>

        <span>Chat</span>
      </a>

      <a>
        <i class="bi bi-person"></i>

        <span>Login</span>
      </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
